name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        uses: Digreatbrian/buildozer-action@v2
        with:
          workdir: .

      - uses: actions/upload-artifact@v4
        with:
          name: TradutorXML
          path: bin/*.apk
